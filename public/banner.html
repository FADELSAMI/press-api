<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sponsors</title>
        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            .banner-content {
                display: flex;
                flex-direction: row;
            }
            .banner-right-content {
                display: flex;
                flex-direction: column;
                justify-content: center;
                text-align: center;
            }
            #banner {
                padding: 8rem;
            }
        </style>
    </head>
    <body>
        <main class="banner">
            <div id="banner"></div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
        <script>
            // Récupérer l'ID de l'article à partir de l'URL
            // Utiliser fetch pour récupérer les articles depuis l'API
            fetch("/banner")
                .then((response) => response.json())
                .then((data) => {
                    // Sélectionner le conteneur où les articles seront affichés
                    const banner = document.getElementById("banner");

                    // // Créer une liste d'articles à afficher

                    const mainBanner = data.banner_4IPDW;
                    // Créer un élément pour chaque article

                    banner.innerHTML = `
                    <div class="banner-content" style="background-color: ${mainBanner.color}">
                        <div class="banner-left-content">
                             <a href="${mainBanner.link}"><img src="${mainBanner.background_image}" /></a>
                        </div>
                        <div class="banner-right-content">
                            <img />
                            <a href="${mainBanner.link}"><img src="${mainBanner.image}" /></a>
                    			<p>${mainBanner.text}</p>
                        </div>
                    </div>`;
                })
                .catch((error) => {
                    console.error(
                        "Erreur lors de la récupération des détails de l'article:",
                        error
                    );
                });
        </script>
    </body>
</html>
